<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Game Demo - 2D RPG</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    body {
      background: #111;
      display: flex;
      justify-content: center;
      align-items: flex-start;
      min-height: 100vh;
      padding: 10px;
      gap: 10px;
    }
    #game-container {
      border: 2px solid #333;
      border-radius: 4px;
      flex-shrink: 0;
    }
    #agent-console {
      width: 420px;
      height: 604px;
      border: 2px solid #333;
      border-radius: 4px;
      background: #0a0a0a;
      display: flex;
      flex-direction: column;
      font-family: 'Courier New', monospace;
      flex-shrink: 0;
    }
    #agent-console-header {
      background: #1a1a2e;
      color: #4488ff;
      padding: 6px 12px;
      font-size: 13px;
      font-weight: bold;
      border-bottom: 1px solid #333;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    #agent-console-header button {
      background: none;
      border: 1px solid #555;
      color: #888;
      padding: 2px 8px;
      font-size: 11px;
      cursor: pointer;
      border-radius: 3px;
    }
    #agent-console-header button:hover {
      color: #fff;
      border-color: #888;
    }
    #agent-console-body {
      flex: 1;
      overflow-y: auto;
      padding: 8px;
      font-size: 12px;
      line-height: 1.5;
      color: #ccc;
    }
    #agent-console-body::-webkit-scrollbar {
      width: 6px;
    }
    #agent-console-body::-webkit-scrollbar-track {
      background: #0a0a0a;
    }
    #agent-console-body::-webkit-scrollbar-thumb {
      background: #333;
      border-radius: 3px;
    }
    .log-entry {
      margin-bottom: 4px;
      border-bottom: 1px solid #1a1a1a;
      padding-bottom: 4px;
    }
    .log-entry:last-child {
      border-bottom: none;
    }
    .log-session {
      border-bottom: 2px solid #2a2a4e;
      margin-bottom: 8px;
      padding-bottom: 8px;
    }
    .log-header {
      color: #4488ff;
      font-weight: bold;
      margin-bottom: 4px;
    }
    .log-tool-call {
      color: #44cc88;
    }
    .log-tool-name {
      color: #88ffaa;
      font-weight: bold;
    }
    .log-tool-result {
      color: #999;
      white-space: pre-wrap;
      word-break: break-all;
      max-height: 120px;
      overflow-y: auto;
      background: #111;
      padding: 3px 6px;
      border-radius: 3px;
      margin: 2px 0;
      font-size: 11px;
    }
    .log-memory {
      color: #cc88ff;
      font-size: 11px;
      border-left: 2px solid #cc88ff;
      padding-left: 6px;
    }
    .log-llm {
      color: #ff8844;
      font-size: 11px;
      border-left: 2px solid #ff8844;
      padding-left: 6px;
    }
    .log-kb {
      color: #44ddaa;
      font-size: 11px;
      border-left: 2px solid #44ddaa;
      padding-left: 6px;
    }
    .log-reasoning {
      color: #ffaa44;
      font-style: italic;
    }
    .log-timing {
      color: #88ddff;
      font-size: 11px;
      border-left: 2px solid #88ddff;
      padding-left: 6px;
    }
    .log-prefetch {
      color: #88ccff;
      font-size: 11px;
      border-left: 2px solid #88ccff;
      padding-left: 6px;
    }
    .log-time {
      color: #555;
      font-size: 10px;
    }
  </style>
</head>
<body>
  <div id="game-container"></div>
  <div id="agent-console">
    <div id="agent-console-header">
      <span>Agent Console</span>
      <div id="login-area">
        <input type="text" id="player-id-input" value="1" placeholder="Player ID" style="width:50px;background:#222;color:#fff;border:1px solid #555;padding:2px 6px;font-size:11px;border-radius:3px;font-family:monospace;">
        <button id="login-btn" onclick="loginPlayer()">Login</button>
        <button onclick="resetGame()" style="border-color:#ff8844 !important;color:#ff8844 !important;">Reset</button>
        <button onclick="document.getElementById('agent-console-body').innerHTML=''">Clear</button>
      </div>
      <div id="logged-in-area" style="display:none;">
        <span id="current-player-label" style="color:#88ff88;font-size:11px;"></span>
        <button id="logout-btn" onclick="logoutPlayer()" style="border-color:#cc4444 !important;color:#cc4444 !important;">Logout</button>
        <button onclick="resetGame()" style="border-color:#ff8844 !important;color:#ff8844 !important;">Reset</button>
        <button onclick="document.getElementById('agent-console-body').innerHTML=''">Clear</button>
      </div>
    </div>
    <div id="agent-console-body"></div>
  </div>
  <script>
    // Store globally so Phaser can read it
    window.gamePlayerId = null;

    function loginPlayer() {
        const input = document.getElementById('player-id-input');
        const playerId = input.value.trim();
        if (!playerId) { alert('请输入Player ID'); return; }

        window.gamePlayerId = playerId;
        document.getElementById('login-area').style.display = 'none';
        document.getElementById('logged-in-area').style.display = '';
        document.getElementById('current-player-label').textContent = `Player: ${playerId}`;
        document.getElementById('agent-console-body').innerHTML = '';

        // Start or restart the game
        window.startGame();
    }

    function logoutPlayer() {
        window.gamePlayerId = null;
        document.getElementById('login-area').style.display = '';
        document.getElementById('logged-in-area').style.display = 'none';
        if (window.gameInstance) {
            window.gameInstance.destroy(true);
            window.gameInstance = null;
        }
    }

    async function resetGame() {
        if (!confirm('Reset all game data? This will delete all players, tasks, and events.')) return;
        try {
            const resp = await fetch('/api/game/reset', { method: 'POST' });
            const data = await resp.json();
            if (data.success) {
                document.getElementById('agent-console-body').innerHTML =
                    '<div class="log-entry" style="color:#ff8844;">Game data reset. ' + data.message + '</div>';
                logoutPlayer();
            } else {
                alert('Reset failed: ' + data.message);
            }
        } catch (err) {
            alert('Reset error: ' + err.message);
        }
    }
  </script>
  <script type="module" src="./src/main.js"></script>
</body>
</html>
