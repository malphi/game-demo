AWSTemplateFormatVersion: '2010-09-09'
Description: >
  Game Demo - Full AWS deployment stack.
  Includes VPC (with VPC Endpoints), EC2 (frontend + backend),
  DynamoDB tables, and IAM roles.

# =============================================================================
# Parameters
# =============================================================================

Parameters:
  Environment:
    Type: String
    Default: dev
    AllowedValues:
      - dev
      - staging
      - prod
    Description: Deployment environment

  GameServerInstanceType:
    Type: String
    Default: t3.micro
    Description: EC2 instance type for the game server

  AgentCoreRuntimeArn:
    Type: String
    Default: ''
    Description: >
      AgentCore Runtime ARN for NPC agent (e.g., arn:aws:bedrock-agentcore:...:runtime/xxx).
      Leave empty on first deploy; set after creating the AgentCore runtime via deploy.sh.

  AgentCoreEndpointName:
    Type: String
    Default: ''
    Description: >
      AgentCore Runtime endpoint name for NPC agent (used as qualifier).
      Leave empty on first deploy; set after creating the endpoint via deploy.sh.

  BedrockModelId:
    Type: String
    Default: us.anthropic.claude-3-5-haiku-20241022-v1:0
    Description: Bedrock model ID for the NPC agent

  BedrockRegion:
    Type: String
    Default: us-west-2
    Description: AWS region for Bedrock API calls

Conditions:
  HasAgentCoreRuntime: !Not [!Equals [!Ref AgentCoreRuntimeArn, '']]

# =============================================================================
# Resources
# =============================================================================

Resources:

  # ===========================================================================
  # Networking — VPC, Subnets, IGW, Route Tables, VPC Endpoints
  # ===========================================================================

  VPC:
    Type: AWS::EC2::VPC
    Properties:
      CidrBlock: 10.0.0.0/16
      EnableDnsSupport: true
      EnableDnsHostnames: true
      Tags:
        - Key: Name
          Value: !Sub 'game-demo-vpc-${Environment}'
        - Key: Project
          Value: game-demo

  InternetGateway:
    Type: AWS::EC2::InternetGateway
    Properties:
      Tags:
        - Key: Name
          Value: !Sub 'game-demo-igw-${Environment}'

  VPCGatewayAttachment:
    Type: AWS::EC2::VPCGatewayAttachment
    Properties:
      VpcId: !Ref VPC
      InternetGatewayId: !Ref InternetGateway

  # --- Public Subnets ---

  PublicSubnet1:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref VPC
      CidrBlock: 10.0.1.0/24
      AvailabilityZone: !Select [0, !GetAZs '']
      MapPublicIpOnLaunch: true
      Tags:
        - Key: Name
          Value: !Sub 'game-demo-public-1-${Environment}'

  PublicSubnet2:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref VPC
      CidrBlock: 10.0.2.0/24
      AvailabilityZone: !Select [1, !GetAZs '']
      MapPublicIpOnLaunch: true
      Tags:
        - Key: Name
          Value: !Sub 'game-demo-public-2-${Environment}'

  PublicRouteTable:
    Type: AWS::EC2::RouteTable
    Properties:
      VpcId: !Ref VPC
      Tags:
        - Key: Name
          Value: !Sub 'game-demo-public-rt-${Environment}'

  PublicRoute:
    Type: AWS::EC2::Route
    DependsOn: VPCGatewayAttachment
    Properties:
      RouteTableId: !Ref PublicRouteTable
      DestinationCidrBlock: 0.0.0.0/0
      GatewayId: !Ref InternetGateway

  PublicSubnet1RouteTableAssociation:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      SubnetId: !Ref PublicSubnet1
      RouteTableId: !Ref PublicRouteTable

  PublicSubnet2RouteTableAssociation:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      SubnetId: !Ref PublicSubnet2
      RouteTableId: !Ref PublicRouteTable

  # --- Private Subnets ---

  PrivateSubnet1:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref VPC
      CidrBlock: 10.0.3.0/24
      AvailabilityZone: !Select [0, !GetAZs '']
      Tags:
        - Key: Name
          Value: !Sub 'game-demo-private-1-${Environment}'

  PrivateSubnet2:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref VPC
      CidrBlock: 10.0.4.0/24
      AvailabilityZone: !Select [1, !GetAZs '']
      Tags:
        - Key: Name
          Value: !Sub 'game-demo-private-2-${Environment}'

  PrivateRouteTable:
    Type: AWS::EC2::RouteTable
    Properties:
      VpcId: !Ref VPC
      Tags:
        - Key: Name
          Value: !Sub 'game-demo-private-rt-${Environment}'

  # No default route (no NAT Gateway) — all AWS service access via VPC Endpoints

  PrivateSubnet1RouteTableAssociation:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      SubnetId: !Ref PrivateSubnet1
      RouteTableId: !Ref PrivateRouteTable

  PrivateSubnet2RouteTableAssociation:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      SubnetId: !Ref PrivateSubnet2
      RouteTableId: !Ref PrivateRouteTable

  # ===========================================================================
  # VPC Endpoints — AWS service access without NAT Gateway
  # ===========================================================================

  # --- Gateway Endpoints (free, route-table based) ---

  DynamoDBEndpoint:
    Type: AWS::EC2::VPCEndpoint
    Properties:
      VpcId: !Ref VPC
      ServiceName: !Sub 'com.amazonaws.${AWS::Region}.dynamodb'
      VpcEndpointType: Gateway
      RouteTableIds:
        - !Ref PrivateRouteTable

  S3Endpoint:
    Type: AWS::EC2::VPCEndpoint
    Properties:
      VpcId: !Ref VPC
      ServiceName: !Sub 'com.amazonaws.${AWS::Region}.s3'
      VpcEndpointType: Gateway
      RouteTableIds:
        - !Ref PrivateRouteTable

  # --- Interface Endpoints (ENI-based, for Bedrock / SSM / ECR) ---

  VPCEndpointSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: Security group for VPC Interface Endpoints (allow HTTPS from VPC)
      VpcId: !Ref VPC
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 443
          ToPort: 443
          CidrIp: 10.0.0.0/16
      Tags:
        - Key: Name
          Value: !Sub 'game-demo-vpce-sg-${Environment}'

  BedrockRuntimeEndpoint:
    Type: AWS::EC2::VPCEndpoint
    Properties:
      VpcId: !Ref VPC
      ServiceName: !Sub 'com.amazonaws.${AWS::Region}.bedrock-runtime'
      VpcEndpointType: Interface
      PrivateDnsEnabled: true
      SubnetIds:
        - !Ref PrivateSubnet1
        - !Ref PrivateSubnet2
      SecurityGroupIds:
        - !Ref VPCEndpointSecurityGroup

  SSMEndpoint:
    Type: AWS::EC2::VPCEndpoint
    Properties:
      VpcId: !Ref VPC
      ServiceName: !Sub 'com.amazonaws.${AWS::Region}.ssm'
      VpcEndpointType: Interface
      PrivateDnsEnabled: true
      SubnetIds:
        - !Ref PrivateSubnet1
        - !Ref PrivateSubnet2
      SecurityGroupIds:
        - !Ref VPCEndpointSecurityGroup

  SSMMessagesEndpoint:
    Type: AWS::EC2::VPCEndpoint
    Properties:
      VpcId: !Ref VPC
      ServiceName: !Sub 'com.amazonaws.${AWS::Region}.ssmmessages'
      VpcEndpointType: Interface
      PrivateDnsEnabled: true
      SubnetIds:
        - !Ref PrivateSubnet1
        - !Ref PrivateSubnet2
      SecurityGroupIds:
        - !Ref VPCEndpointSecurityGroup

  EC2MessagesEndpoint:
    Type: AWS::EC2::VPCEndpoint
    Properties:
      VpcId: !Ref VPC
      ServiceName: !Sub 'com.amazonaws.${AWS::Region}.ec2messages'
      VpcEndpointType: Interface
      PrivateDnsEnabled: true
      SubnetIds:
        - !Ref PrivateSubnet1
        - !Ref PrivateSubnet2
      SecurityGroupIds:
        - !Ref VPCEndpointSecurityGroup

  BedrockAgentCoreEndpoint:
    Type: AWS::EC2::VPCEndpoint
    Properties:
      VpcId: !Ref VPC
      ServiceName: !Sub 'com.amazonaws.${AWS::Region}.bedrock-agentcore'
      VpcEndpointType: Interface
      PrivateDnsEnabled: true
      SubnetIds:
        - !Ref PrivateSubnet1
        - !Ref PrivateSubnet2
      SecurityGroupIds:
        - !Ref VPCEndpointSecurityGroup

  BedrockAgentCoreGatewayEndpoint:
    Type: AWS::EC2::VPCEndpoint
    Properties:
      VpcId: !Ref VPC
      ServiceName: !Sub 'com.amazonaws.${AWS::Region}.bedrock-agentcore.gateway'
      VpcEndpointType: Interface
      PrivateDnsEnabled: true
      SubnetIds:
        - !Ref PrivateSubnet1
        - !Ref PrivateSubnet2
      SecurityGroupIds:
        - !Ref VPCEndpointSecurityGroup

  STSEndpoint:
    Type: AWS::EC2::VPCEndpoint
    Properties:
      VpcId: !Ref VPC
      ServiceName: !Sub 'com.amazonaws.${AWS::Region}.sts'
      VpcEndpointType: Interface
      PrivateDnsEnabled: true
      SubnetIds:
        - !Ref PrivateSubnet1
        - !Ref PrivateSubnet2
      SecurityGroupIds:
        - !Ref VPCEndpointSecurityGroup

  ECRApiEndpoint:
    Type: AWS::EC2::VPCEndpoint
    Properties:
      VpcId: !Ref VPC
      ServiceName: !Sub 'com.amazonaws.${AWS::Region}.ecr.api'
      VpcEndpointType: Interface
      PrivateDnsEnabled: true
      SubnetIds:
        - !Ref PrivateSubnet1
        - !Ref PrivateSubnet2
      SecurityGroupIds:
        - !Ref VPCEndpointSecurityGroup

  ECRDkrEndpoint:
    Type: AWS::EC2::VPCEndpoint
    Properties:
      VpcId: !Ref VPC
      ServiceName: !Sub 'com.amazonaws.${AWS::Region}.ecr.dkr'
      VpcEndpointType: Interface
      PrivateDnsEnabled: true
      SubnetIds:
        - !Ref PrivateSubnet1
        - !Ref PrivateSubnet2
      SecurityGroupIds:
        - !Ref VPCEndpointSecurityGroup

  # ===========================================================================
  # Security Groups
  # ===========================================================================

  AgentCoreSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: Security group for AgentCore Runtime (VPC mode)
      VpcId: !Ref VPC
      # No inbound rules — AgentCore is invoked via AWS SDK, not direct network
      # Default outbound allows all (DynamoDB via Gateway Endpoint, Bedrock via Interface Endpoint)
      Tags:
        - Key: Name
          Value: !Sub 'game-demo-agentcore-sg-${Environment}'

  GameServerSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: Security group for game server EC2 (SSM access only, no inbound needed)
      VpcId: !Ref VPC
      # No inbound rules — access via SSM Session Manager port forwarding only
      Tags:
        - Key: Name
          Value: !Sub 'game-demo-gs-sg-${Environment}'

  # ===========================================================================
  # Game Server — EC2 + Auto Scaling Group
  # ===========================================================================

  # --- IAM Roles ---

  GameServerRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub 'game-demo-game-server-${Environment}'
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: ec2.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/AmazonSSMManagedInstanceCore
      Policies:
        - PolicyName: DynamoDBAccess
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - dynamodb:GetItem
                  - dynamodb:PutItem
                  - dynamodb:UpdateItem
                  - dynamodb:DeleteItem
                  - dynamodb:Query
                  - dynamodb:Scan
                  - dynamodb:BatchGetItem
                  - dynamodb:BatchWriteItem
                Resource:
                  - !GetAtt PlayersTable.Arn
                  - !Sub '${PlayersTable.Arn}/index/*'
                  - !GetAtt MonstersTable.Arn
                  - !GetAtt NPCsTable.Arn
                  - !GetAtt ItemsTable.Arn
                  - !GetAtt TasksTable.Arn
                  - !Sub '${TasksTable.Arn}/index/*'
                  - !GetAtt PlayerEventSummaryTable.Arn
                  - !Sub '${PlayerEventSummaryTable.Arn}/index/*'
        - PolicyName: AgentCoreAccess
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - bedrock:InvokeAgent
                  - bedrock:InvokeAgentRuntime
                  - bedrock-agentcore:InvokeAgentRuntime
                Resource: '*'
        - PolicyName: S3ArtifactAccess
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - s3:GetObject
                  - s3:ListBucket
                Resource:
                  - !GetAtt AgentCoreArtifactBucket.Arn
                  - !Sub '${AgentCoreArtifactBucket.Arn}/*'

  GameServerInstanceProfile:
    Type: AWS::IAM::InstanceProfile
    Properties:
      InstanceProfileName: !Sub 'game-demo-game-server-${Environment}'
      Roles:
        - !Ref GameServerRole

  # --- Launch Template ---

  GameServerLaunchTemplate:
    Type: AWS::EC2::LaunchTemplate
    Properties:
      LaunchTemplateName: !Sub 'game-demo-gs-${Environment}'
      LaunchTemplateData:
        ImageId: !Sub '{{resolve:ssm:/aws/service/ami-amazon-linux-latest/al2023-ami-kernel-default-x86_64}}'
        InstanceType: !Ref GameServerInstanceType
        IamInstanceProfile:
          Arn: !GetAtt GameServerInstanceProfile.Arn
        SecurityGroupIds:
          - !Ref GameServerSecurityGroup
        TagSpecifications:
          - ResourceType: instance
            Tags:
              - Key: Name
                Value: !Sub 'game-demo-gs-${Environment}'
              - Key: Project
                Value: game-demo
        UserData:
          Fn::Base64: !Sub |
            #!/bin/bash
            set -ex

            # Install Node.js 20 from AL2023 built-in repos (served via S3, no internet needed)
            dnf install -y nodejs20 unzip

            # Download game server code from S3 (via S3 Gateway Endpoint)
            mkdir -p /opt/game-server
            aws s3 cp s3://${AgentCoreArtifactBucket}/game-server/latest.zip /opt/game-server/code.zip --region ${AWS::Region} || true
            if [ -f /opt/game-server/code.zip ]; then
              cd /opt/game-server
              unzip -o code.zip
              # node_modules is pre-packaged in the zip, no npm ci needed
            fi

            # Create systemd service
            cat > /etc/systemd/system/game-server.service << 'EOF'
            [Unit]
            Description=Game Demo Server
            After=network.target

            [Service]
            Type=simple
            WorkingDirectory=/opt/game-server
            EnvironmentFile=/opt/game-server/.env
            ExecStart=/usr/bin/node src/index.js
            Restart=always
            RestartSec=5

            [Install]
            WantedBy=multi-user.target
            EOF

            # Create environment file
            cat > /opt/game-server/.env << ENVEOF
            PORT=8080
            USE_DYNAMODB=true
            AWS_REGION=${AWS::Region}
            ENV=${Environment}
            AGENTCORE_RUNTIME_ARN=${AgentCoreRuntimeArn}
            AGENTCORE_ENDPOINT_NAME=${AgentCoreEndpointName}
            ENVEOF

            # Start service if code was downloaded
            if [ -f /opt/game-server/src/index.js ]; then
              systemctl daemon-reload
              systemctl enable game-server
              systemctl start game-server
            fi

  # --- Auto Scaling Group (single instance, handles target group registration) ---

  GameServerASG:
    Type: AWS::AutoScaling::AutoScalingGroup
    Properties:
      AutoScalingGroupName: !Sub 'game-demo-gs-${Environment}'
      LaunchTemplate:
        LaunchTemplateId: !Ref GameServerLaunchTemplate
        Version: !GetAtt GameServerLaunchTemplate.LatestVersionNumber
      MinSize: 1
      MaxSize: 1
      DesiredCapacity: 1
      VPCZoneIdentifier:
        - !Ref PrivateSubnet1
        - !Ref PrivateSubnet2
      HealthCheckType: EC2
      HealthCheckGracePeriod: 300
      Tags:
        - Key: Project
          Value: game-demo
          PropagateAtLaunch: false

  # --- AgentCore Runtime IAM Role (for NPC agent running on AgentCore) ---

  AgentCoreRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub 'game-demo-agentcore-${Environment}'
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service:
                - bedrock.amazonaws.com
                - bedrock-agentcore.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: DynamoDBAccess
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - dynamodb:GetItem
                  - dynamodb:PutItem
                  - dynamodb:UpdateItem
                  - dynamodb:DeleteItem
                  - dynamodb:Query
                  - dynamodb:Scan
                  - dynamodb:BatchGetItem
                Resource:
                  - !GetAtt PlayersTable.Arn
                  - !Sub '${PlayersTable.Arn}/index/*'
                  - !GetAtt MonstersTable.Arn
                  - !GetAtt NPCsTable.Arn
                  - !GetAtt ItemsTable.Arn
                  - !GetAtt TasksTable.Arn
                  - !Sub '${TasksTable.Arn}/index/*'
                  - !GetAtt PlayerEventSummaryTable.Arn
                  - !Sub '${PlayerEventSummaryTable.Arn}/index/*'
        - PolicyName: BedrockAccess
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - bedrock:InvokeModel
                  - bedrock:InvokeModelWithResponseStream
                Resource: '*'
        - PolicyName: ECRPullAccess
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - ecr:GetAuthorizationToken
                  - ecr:BatchGetImage
                  - ecr:GetDownloadUrlForLayer
                  - ecr:BatchCheckLayerAvailability
                Resource: '*'

  # ===========================================================================
  # S3 Bucket for AgentCore code artifacts
  # ===========================================================================

  AgentCoreArtifactBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Sub 'game-demo-agentcore-${AWS::AccountId}-${Environment}'
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true
      Tags:
        - Key: Project
          Value: game-demo
        - Key: Environment
          Value: !Ref Environment

  # ===========================================================================
  # DynamoDB Tables
  # ===========================================================================

  PlayersTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: !Sub 'Players-${Environment}'
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: player_id
          AttributeType: S
      KeySchema:
        - AttributeName: player_id
          KeyType: HASH
      Tags:
        - Key: Project
          Value: game-demo
        - Key: Environment
          Value: !Ref Environment

  MonstersTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: !Sub 'Monsters-${Environment}'
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: monster_id
          AttributeType: S
      KeySchema:
        - AttributeName: monster_id
          KeyType: HASH
      Tags:
        - Key: Project
          Value: game-demo
        - Key: Environment
          Value: !Ref Environment

  NPCsTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: !Sub 'NPCs-${Environment}'
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: npc_id
          AttributeType: S
      KeySchema:
        - AttributeName: npc_id
          KeyType: HASH
      Tags:
        - Key: Project
          Value: game-demo
        - Key: Environment
          Value: !Ref Environment

  ItemsTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: !Sub 'Items-${Environment}'
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: item_id
          AttributeType: S
      KeySchema:
        - AttributeName: item_id
          KeyType: HASH
      Tags:
        - Key: Project
          Value: game-demo
        - Key: Environment
          Value: !Ref Environment

  TasksTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: !Sub 'Tasks-${Environment}'
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: task_id
          AttributeType: S
        - AttributeName: player_id
          AttributeType: S
        - AttributeName: status
          AttributeType: S
      KeySchema:
        - AttributeName: task_id
          KeyType: HASH
      GlobalSecondaryIndexes:
        - IndexName: player_id-index
          KeySchema:
            - AttributeName: player_id
              KeyType: HASH
            - AttributeName: status
              KeyType: RANGE
          Projection:
            ProjectionType: ALL
      Tags:
        - Key: Project
          Value: game-demo
        - Key: Environment
          Value: !Ref Environment

  PlayerEventSummaryTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: !Sub 'PlayerEventSummary-${Environment}'
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: player_id
          AttributeType: S
        - AttributeName: event_id
          AttributeType: S
      KeySchema:
        - AttributeName: player_id
          KeyType: HASH
        - AttributeName: event_id
          KeyType: RANGE
      Tags:
        - Key: Project
          Value: game-demo
        - Key: Environment
          Value: !Ref Environment

# =============================================================================
# Outputs
# =============================================================================

Outputs:
  VPCId:
    Description: VPC ID
    Value: !Ref VPC

  GameServerASGName:
    Description: Auto Scaling Group name for game server EC2
    Value: !Ref GameServerASG

  AgentCoreRoleArn:
    Description: IAM role ARN for AgentCore Runtime (NPC agent)
    Value: !GetAtt AgentCoreRole.Arn

  PlayersTableName:
    Description: Name of the Players DynamoDB table
    Value: !Ref PlayersTable

  PlayersTableArn:
    Description: ARN of the Players DynamoDB table
    Value: !GetAtt PlayersTable.Arn

  MonstersTableName:
    Description: Name of the Monsters DynamoDB table
    Value: !Ref MonstersTable

  NPCsTableName:
    Description: Name of the NPCs DynamoDB table
    Value: !Ref NPCsTable

  ItemsTableName:
    Description: Name of the Items DynamoDB table
    Value: !Ref ItemsTable

  TasksTableName:
    Description: Name of the Tasks DynamoDB table
    Value: !Ref TasksTable

  PlayerEventSummaryTableName:
    Description: Name of the PlayerEventSummary DynamoDB table
    Value: !Ref PlayerEventSummaryTable

  AgentCoreArtifactBucketName:
    Description: S3 bucket for AgentCore NPC agent code artifacts
    Value: !Ref AgentCoreArtifactBucket

  PrivateSubnet1Id:
    Description: Private subnet 1 ID (for AgentCore VPC mode)
    Value: !Ref PrivateSubnet1

  PrivateSubnet2Id:
    Description: Private subnet 2 ID (for AgentCore VPC mode)
    Value: !Ref PrivateSubnet2

  AgentCoreSecurityGroupId:
    Description: Security group ID for AgentCore Runtime (VPC mode)
    Value: !Ref AgentCoreSecurityGroup
